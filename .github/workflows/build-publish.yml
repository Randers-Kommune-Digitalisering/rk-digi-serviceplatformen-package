name: build-publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-publish:
    name: Publish to PyPI
    # runs-on: windows-latest
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4      
        with:
          fetch-depth: 0


      - name: Ensure tag is on main branch
        run: |
          TAG_COMMIT="$GITHUB_SHA"
          MAIN_COMMIT="$(git rev-parse origin/main)"
          if ! git merge-base --is-ancestor "$TAG_COMMIT" "$MAIN_COMMIT"; then
            echo "::error::Tag is not on main branch."
            exit 1
          fi
      - name: Check version matches tag
        run: |
          PKG_VERSION=$(grep '^version' python/pyproject.toml | head -1 | sed -E 's/^version *= *"(.*)"/\1/')
          TAG_VERSION=${GITHUB_REF##*/}
          TAG_VERSION=${TAG_VERSION#v}
          echo "Version in pyproject.toml: $PKG_VERSION"
          echo "Version from tag: $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version in pyproject.toml ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Build .NET library (Release)
        run: >
          dotnet build
          dotnet/src/KombitServiceClient/KombitServiceClient.csproj
          -c Release
          --nologo

      - name: Bundle DLLs into Python package
        # Copies every file from the .NET Release output into
        # python/src/kombit-client/dotnet/ so they are picked up
        # as wheel artifacts and end up in the installed package.
        # shell: pwsh
        shell: bash        
        run: |
          src="dotnet/src/KombitServiceClient/bin/Release/net9.0"
          dst="python/src/kombit-client/dotnet"
          mkdir -p "$dst"
          cp -r "$src"/* "$dst"

        # run: |
        #   $src = "dotnet\src\KombitServiceClient\bin\Release\net9.0"
        #   $dst = "python\src\kombit-client\dotnet"
        #   New-Item -ItemType Directory -Force -Path $dst | Out-Null
        #   Copy-Item "$src\*" -Destination $dst -Recurse -Force

      - name: Install build + publish tools
        shell: bash
        run: |
          pip install --upgrade pip
          pip install build twine

      - name: Build wheel
        working-directory: python
        shell: bash
        run: |
          python -m build --wheel

      - name: Publish to PyPI
        working-directory: python
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN_KOMBIT_CLIENT }}
        run: |
          twine upload dist/*.whl

